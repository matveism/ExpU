<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<!-- Force mobile width -->
<meta name="viewport" content="width=480">

<title>Phone 480x800</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #111; /* dark background so phone stands out */
}

/* Fake phone screen */
.phone {
  width: 480px;
  height: 800px;
  background-color: #41729E;
  color: #fff;
  font-family: "Courier New", monospace;
  padding: 0; /* remove padding so header aligns cleanly */
  box-sizing: border-box;

  position: absolute;
  left: 0;
  top: 0;

  overflow: hidden;
}

/* Header bar */
.header {
  background-color: #2E5877; /* darker shade of blue */
  height: 50px;
  display: flex;
  align-items: center;
  padding-left: 20px;
  font-weight: bold;
  font-size: 20px;
  border-bottom: 3px solid rgba(255,255,255,0.3);
}

.content {
  padding: 10px;
}

h1 {
  font-size: 22px;
  margin: 10px 0;
  text-align: center;
}

p {
  font-size: 16px;
  text-align: center;
}
</style>
</head>

<body>

<div class="phone">

  <div class="header">
    LOGIN
  </div>

  <div class="content">
    <h1>480×800 Mobile</h1>
    <p>This box matches your real 4.0-inch phone screen.</p>
  </div>

</div>

</body>
</html>
