<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<!-- Force mobile width -->
<meta name="viewport" content="width=480">

<title>Phone 480x800</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #111; /* dark background so phone stands out */
}

/* Fake phone screen */
.phone {
  width: 480px;          /* exact phone width */
  height: 800px;         /* exact phone height */
  background-color: #41729E;
  color: #fff;
  font-family: "Courier New", monospace;
  padding: 10px;
  box-sizing: border-box;

  /* Pin to left side of desktop */
  position: absolute;
  left: 0;
  top: 0;

  /* Prevent desktop scaling */
  overflow: hidden;
}

h1 {
  font-size: 22px;
  margin: 10px 0;
  text-align: center;
}

p {
  font-size: 16px;
  text-align: center;
}
</style>
</head>

<body>

<div class="phone">
  <h1>480×800 Mobile</h1>
  <p>This box matches your real 4.0-inch phone screen.</p>
</div>

</body>
</html>
